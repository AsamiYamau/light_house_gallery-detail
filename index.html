<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery Links</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ee;
      color: #2b211c;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(720px, calc(100% - 40px));
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      letter-spacing: 0.04em;
    }

    .links {
      display: grid;
      gap: 16px;
    }

    a {
      display: block;
      padding: 20px 24px;
      border: 1px solid #d8c7ba;
      border-radius: 12px;
      background: #fff;
      color: inherit;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(43, 33, 28, 0.12);
    }
  </style>
</head>

<body>
  <main>
    <h1>Gallery Links</h1>
    <div class="links">
      <a href="./mr.buffet/gallery/">mr.buffet のギャラリーはこちら</a>
      <a href="./bonbonniere/gallery/">bonbonniere のギャラリーはこちら</a>
      <a href="./gazzo/gallery/">gazzo のギャラリーはこちら</a>
    </div>
  </main>
</body>

</html>
